name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  integration-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Rust version
        run: |
          rustc --version
          cargo --version

      - name: Run integration tests
        run: cargo test --test cli
